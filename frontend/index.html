<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Content Security Policy for Electron compatibility -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src  'self' 'unsafe-inline' 'unsafe-eval';
        style-src   'self' 'unsafe-inline';
        font-src    'self' data:;
        img-src     'self' data:;
        connect-src 'self' http://127.0.0.1:8000 ws://127.0.0.1:8000 http://localhost:8000 ws://localhost:8000;
      "
    />

    <title>TARS</title>

    <!-- No webfont by design: the UI uses the platform system font (SF Pro on
         macOS, Segoe UI Variable on Windows). A HUD that summons in <100ms must
         never flash fallback text while a CDN font loads. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
