<!DOCTYPE html>
<html lang="en" data-platform="">
<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  ROMANOV — Command Overlay                                   ║
  ║  Electron frameless window · macOS + Windows                 ║
  ║  Preview: open in browser. Electron: remove class preview-bg ║
  ╚══════════════════════════════════════════════════════════════╝
-->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta
    http-equiv="Content-Security-Policy"
    content="
      default-src 'self';
      script-src  'self' 'unsafe-inline';
      style-src   'self' https://fonts.googleapis.com 'unsafe-inline';
      font-src    'self' https://fonts.gstatic.com data:;
      img-src     'self' data:;
      connect-src 'self' http://127.0.0.1:8000;
    "
  />

  <title>ROMANOV</title>

  <!-- Google Font: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>

<!--
  Add class "preview-bg" when opening in a browser for preview.
  Remove it in Electron — the window background is transparent.
-->
<body class="preview-bg">

  <!-- ═══════════════════════════════════════════════════════
       ROMANOV SHELL
       ═══════════════════════════════════════════════════════ -->
  <div
    id="romanov-shell"
    role="dialog"
    aria-label="ROMANOV Command Interface"
    aria-modal="true"
  >

    <!-- Glass card -->
    <div class="glass-card">

      <!-- ── Top row: input ── -->
      <div class="input-row">

        <!-- Leading icon -->
        <div class="input-icon" aria-hidden="true">
          <svg id="icon-idle" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <!-- Spinner shown during RUNNING state -->
          <svg id="icon-running" class="hidden spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
          </svg>
          <!-- Mic icon shown during LISTENING state -->
          <svg id="icon-mic" class="hidden pulse-mic" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </div>

        <!-- Command input -->
        <input
          id="romanov-input"
          class="cmd-input"
          type="text"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          enterkeyhint="send"
          placeholder="Ask anything or give a command…"
          aria-label="Command input — Enter to send, Escape to dismiss"
        />

        <!-- Voice button -->
        <button
          id="mic-btn"
          class="mic-btn"
          aria-label="Voice input"
          title="Hold to speak"
        >
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>

      </div><!-- /input-row -->

      <!-- ── Divider ── -->
      <div class="h-divider" aria-hidden="true"></div>

      <!-- ── Bottom row: status + hint ── -->
      <div class="meta-row">

        <!-- Status pill -->
        <div class="status-pill" aria-live="polite" aria-atomic="true">
          <span id="status-dot" class="status-dot idle"></span>
          <span id="status-text" class="status-label">Ready</span>
        </div>

        <!-- Keyboard hints -->
        <div class="hints" aria-hidden="true">
          <kbd>↵</kbd><span>send</span>
          <span class="hint-sep">·</span>
          <kbd>esc</kbd><span>dismiss</span>
          <span class="hint-sep">·</span>
          <kbd>↑↓</kbd><span>history</span>
        </div>

        <!-- Connection indicator -->
        <div class="conn-group" aria-label="Backend status" role="status">
          <span id="conn-dot" class="conn-dot" title="Connecting…"></span>
          <span id="conn-label" class="conn-label">localhost:8000</span>
        </div>

      </div><!-- /meta-row -->

    </div><!-- /glass-card -->

  </div><!-- /romanov-shell -->

  <script src="renderer.js" defer></script>

</body>
</html>
